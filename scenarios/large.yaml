name: large
seed: 7654321                 # deterministic; same seed => same plan

resources:
  subnet_pools:    6
  address_scopes:  0
  networks:        200
  routers:         40
  security_groups: 30
  router_links:    10            # router-to-router transit links
  floating_ips:    20           # allocated from the external network, if one exists

distribution:
  subnets_per_network:      { min: 1, max: 3 }    # ~400 subnets total
  ports_per_network:        { min: 0, max: 5 }
  rules_per_security_group: { min: 2, max: 12 }
  subnet_from_pool_ratio:   0.4
  ipv6_ratio:               0.2
  subnets_attached_to_router_ratio: 0.6
  routers_with_external_gateway_ratio: 0.3
  floating_ip_associated_ratio:        0.5

topology:
  router_attach_strategy:    random
  port_security_group_count: { min: 1, max: 3 }

chaos:                                 # `neutron chaos --scenario scenarios/large.yaml` runs as-is
  duration: 1h                         # total runtime; the only hard stop besides Ctrl-C
  interval: { min: 100ms, max: 2s }    # random delay drawn per churn tick
  parallel: { max: 8 }                 # per-tick fan-out, drawn in [1, max]; capped by --concurrency
  churn_ratio: 0.5                     # create bias at steady state (0..1)
  target_fill: 0.6                     # fraction of the envelope kept populated (0..1)
